<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>城市天气预报</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(96, 165, 250, 0.25), transparent 28%),
        linear-gradient(135deg, #f8fbff 0%, #eef6ff 45%, #e8f0ff 100%);
      color: #0f172a;
      min-height: 100vh;
      padding: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .app {
      width: min(100%, 1100px);
      background: linear-gradient(145deg, rgba(255,255,255,0.96), rgba(242,248,255,0.94));
      backdrop-filter: blur(16px);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 30px;
      box-shadow: 0 36px 80px rgba(15, 23, 42, 0.12);
      padding: 34px;
      position: relative;
      overflow: hidden;
    }
    .app::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top right, rgba(59, 130, 246, 0.12), transparent 30%);
      pointer-events: none;
    }
    .header {
      text-align: center;
      margin-bottom: 22px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 32px;
      font-weight: 800;
      color: #0f3d91;
      letter-spacing: -0.02em;
    }
    .subtitle {
      margin: 0;
      color: #64748b;
      font-size: 15px;
    }
    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 12px;
      margin-bottom: 12px;
      align-items: end;
      background: rgba(248, 251, 255, 0.92);
      border: 1px solid rgba(191, 219, 254, 0.65);
      border-radius: 20px;
      padding: 16px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.8);
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .field label {
      font-size: 13px;
      color: #334155;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .field input {
      border: 1px solid #d7e6ff;
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 15px;
      outline: none;
      background: #fbfdff;
      transition: all 0.2s ease;
    }
    .field input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
      background: white;
    }
    .btn {
      border: none;
      border-radius: 14px;
      padding: 12px 18px;
      background: linear-gradient(90deg, #2563eb, #3b82f6 60%, #60a5fa);
      color: white;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(37, 99, 235, 0.25);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 30px rgba(37, 99, 235, 0.28);
    }
    .hint {
      text-align: center;
      color: #64748b;
      font-size: 14px;
      margin-bottom: 18px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 20px;
    }
    .city-card {
      background: linear-gradient(145deg, #ffffff, #f4f9ff);
      border: 1px solid rgba(191, 219, 254, 0.85);
      border-radius: 24px;
      padding: 22px;
      min-height: 290px;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.07);
      position: relative;
      overflow: hidden;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .city-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 24px 48px rgba(15, 23, 42, 0.1);
    }
    .city-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, rgba(59, 130, 246, 0.08), transparent 45%);
      pointer-events: none;
    }
    .city-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      position: relative;
      z-index: 1;
    }
    .city-name {
      font-size: 22px;
      font-weight: 800;
      color: #112b58;
    }
    .updated {
      font-size: 12px;
      color: #64748b;
    }
    .city-meta {
      color: #64748b;
      font-size: 14px;
      margin-bottom: 16px;
      position: relative;
      z-index: 1;
    }
    .weather-main {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
      position: relative;
      z-index: 1;
    }
    .weather-icon { font-size: 58px; }
    .temp { font-size: 44px; font-weight: 800; color: #1e3a8a; }
    .desc { font-size: 16px; color: #334155; margin-bottom: 12px; position: relative; z-index: 1; }
    .detail-list { display: grid; gap: 8px; color: #475569; font-size: 15px; position: relative; z-index: 1; }
    .forecast {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 14px;
      position: relative;
      z-index: 1;
    }
    .forecast-item {
      text-align: center;
      background: linear-gradient(180deg, #fbfdff, #f3f8ff);
      border: 1px solid #e3efff;
      border-radius: 12px;
      padding: 8px 6px;
      font-size: 13px;
      color: #334155;
      font-weight: 600;
    }
    .loading, .error {
      text-align: center;
      padding: 28px 0;
      color: #64748b;
      grid-column: 1 / -1;
      font-size: 16px;
    }
    .error { color: #dc2626; }
    @media (max-width: 760px) {
      .controls { grid-template-columns: 1fr; }
      .grid { grid-template-columns: 1fr; }
      .forecast { grid-template-columns: 1fr; }
      .app { padding: 20px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>城市天气预报</h1>
      <p class="subtitle">查看两个城市的实时天气与未来几天天气</p>
    </div>

    <form id="weatherForm" class="controls">
      <div class="field">
        <label for="city1">城市 1</label>
        <input id="city1" name="city1" type="text" value="北京" placeholder="请输入城市" />
      </div>
      <div class="field">
        <label for="city2">城市 2</label>
        <input id="city2" name="city2" type="text" value="天津" placeholder="请输入城市" />
      </div>
      <button class="btn" type="submit">更新天气</button>
    </form>

    <div class="hint">支持输入任意城市名称，例如上海、广州、深圳</div>
    <div id="weatherGrid" class="grid"></div>
  </div>

  <script>
    const weatherGrid = document.getElementById("weatherGrid");
    const weatherForm = document.getElementById("weatherForm");
    const city1Input = document.getElementById("city1");
    const city2Input = document.getElementById("city2");

    const weatherCodeMap = {
      0: { text: "晴天", icon: "☀️" },
      1: { text: "大部晴", icon: "🌤️" },
      2: { text: "局部多云", icon: "⛅" },
      3: { text: "阴天", icon: "☁️" },
      45: { text: "雾", icon: "🌫️" },
      48: { text: "冻雾", icon: "🌫️" },
      51: { text: "小毛毛雨", icon: "🌦️" },
      53: { text: "中毛毛雨", icon: "🌦️" },
      55: { text: "强毛毛雨", icon: "🌦️" },
      61: { text: "小雨", icon: "🌧️" },
      63: { text: "中雨", icon: "🌧️" },
      65: { text: "大雨", icon: "🌧️" },
      71: { text: "小雪", icon: "🌨️" },
      73: { text: "中雪", icon: "❄️" },
      75: { text: "大雪", icon: "❄️" },
      95: { text: "雷暴", icon: "⛈️" },
      96: { text: "雷暴伴冰雹", icon: "⛈️" },
      99: { text: "强雷暴", icon: "⛈️" }
    };

    function getWeatherInfo(code) {
      return weatherCodeMap[code] || { text: "未知", icon: "🌈" };
    }

    function formatDate(dateStr) {
      const date = new Date(dateStr);
      return `${date.getMonth() + 1}/${date.getDate()}`;
    }

    function formatTime(date) {
      return `${date.getHours()}:${String(date.getMinutes()).padStart(2, "0")}`;
    }

    function renderLoading() {
      weatherGrid.innerHTML = '<div class="loading">正在加载天气数据...</div>';
    }

    function renderError(message) {
      weatherGrid.innerHTML = `<div class="error">${message}</div>`;
    }

    async function resolveLocation(city) {
      const queries = [
        city,
        `${city}市`,
        `${city}县`,
        `${city}, 中国`,
        `${city}市, 中国`
      ];

      for (const query of queries) {
        const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=5&language=zh&format=json`);
        if (!geoRes.ok) continue;

        const geoData = await geoRes.json();
        const location = geoData.results?.find((item) => item.country === "中国") || geoData.results?.[0];
        if (location) {
          return location;
        }
      }

      return null;
    }

    async function loadWeather(city) {
      const location = await resolveLocation(city);
      if (!location) throw new Error(`找不到城市：${city}`);

      const forecastRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${location.latitude}&longitude=${location.longitude}&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=Asia%2FShanghai`);
      if (!forecastRes.ok) throw new Error("天气数据获取失败，请稍后再试");

      const data = await forecastRes.json();
      const current = data.current;
      const daily = data.daily;
      const weather = getWeatherInfo(current.weather_code);

      return {
        city: location.name,
        country: location.country,
        temp: Math.round(current.temperature_2m),
        desc: weather.text,
        icon: weather.icon,
        humidity: current.relative_humidity_2m,
        wind: Math.round(current.wind_speed_10m),
        updated: formatTime(new Date()),
        forecast: daily.time.slice(0, 3).map((day, index) => ({
          day: index === 0 ? "今天" : index === 1 ? "明天" : "后天",
          date: formatDate(day),
          high: Math.round(daily.temperature_2m_max[index]),
          low: Math.round(daily.temperature_2m_min[index]),
          weather: getWeatherInfo(daily.weather_code[index])
        }))
      };
    }

    async function renderWeather(cities) {
      renderLoading();
      try {
        const results = await Promise.all(cities.map(loadWeather));
        weatherGrid.innerHTML = results.map(renderCityCard).join("");
      } catch (error) {
        renderError(error.message || "加载失败");
      }
    }

    function renderCityCard(item) {
      return `
        <div class="city-card">
          <div class="city-top">
            <div class="city-name">${item.city}</div>
            <div class="updated">更新 ${item.updated}</div>
          </div>
          <div class="city-meta">${item.country}</div>
          <div class="weather-main">
            <div class="weather-icon">${item.icon}</div>
            <div class="temp">${item.temp}°</div>
          </div>
          <div class="desc">${item.desc}</div>
          <div class="detail-list">
            <div>💧 湿度：${item.humidity}%</div>
            <div>🌬️ 风速：${item.wind} km/h</div>
          </div>
          <div class="forecast">
            ${item.forecast.map(day => `
              <div class="forecast-item">
                <div>${day.day}</div>
                <div>${day.date}</div>
                <div>${day.weather.icon}</div>
                <div>${day.high}° / ${day.low}°</div>
              </div>
            `).join("")}
          </div>
        </div>
      `;
    }

    weatherForm.addEventListener("submit", (event) => {
      event.preventDefault();
      const cities = [city1Input.value.trim(), city2Input.value.trim()].filter(Boolean);
      if (cities.length !== 2) {
        renderError("请同时输入两个城市名称");
        return;
      }
      renderWeather(cities);
    });

    renderWeather(["北京", "天津"]);
  </script>
</body>
</html>
